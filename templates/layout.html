<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/static/css/output.css" />
        <script src="/static/js/index.js"></script>
        <script src="https://unpkg.com/hyperscript.org@0.9.12"></script>
        <title>{{ .Title }} | Philthy Blog</title>
    </head>
    <body class="h-screen">
        <div id="root" class="min-h-screen">
            {{ template "header.html" . }} {{ template "navmenu.html" . }}
            <div class="h-[95px]"></div>
            <main
                class="flex-grow p-4 flex flex-col gap-4 md:pl-[300px]"
                style="min-height: calc(100vh - 190px)"
            >
                <div class="flex flex-col md:pl-12 md:p-8 gap-4">
                    {{.Content}}
                </div>
            </main>
            {{ template "overlay.html" . }}
            <div class="h-[100px]"></div>
        </div>
    </body>
</html>
