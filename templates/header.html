<header
    class="flex flex-row justify-between p-4 border-b select-none z-40 bg-white fixed w-full top-0 h-[95px]"
>
    <img src="/static/img/logo.svg" />
    <div class="flex flex-col gap-2">
        <h1 class="font-bold text-2xl">{{ .HeaderText }}</h1>
        <p class="text-sm">{{ .SubText }}</p>
    </div>
    <div class="flex items-center">
        <div
            id="icon-bars"
            _="on click toggle .hidden on me then toggle .hidden on #icon-x then toggle .hidden on #overlay then toggle .hidden on #navmenu"
            class="md:hidden"
        >
            <svg
                class="w-8 h-8"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
            >
                <path
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="2"
                    d="M5 7h14M5 12h14M5 17h14"
                />
            </svg>
        </div>
        <div
            id="icon-x"
            class="hidden md:hidden"
            _="on click toggle .hidden on me then toggle .hidden on #icon-bars then toggle .hidden on #overlay then toggle .hidden on #navmenu"
        >
            <svg
                class="w-8 h-8"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
            >
                <path
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 18 17.94 6M18 18 6.06 6"
                />
            </svg>
        </div>
    </div>
</header>
